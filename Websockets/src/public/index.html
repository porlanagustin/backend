<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat app</title>
</head>
<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.form{
    width: 400px;
    background: #24303c;
    padding: 30px;
    margin: auto;
    margin-top: 100px;
    border-radius: 4px;
    font-family: 'calibri';
    color: white;
}

.form h4{
    font-size: 22px;
    margin-bottom: 20px;
    text-align: center;
}

.table{
    text-align: center;
    height: 250px;
    margin-top: 20px;
}

#productForm input{
    width: 100%;
    padding: 10px;
    border-radius: 4px;
    margin-bottom: 16px;
}

thead{
    background-color: #24303c;
}

th{
    padding: 20px 15px;
    font-weight: 700;
    text-transform: uppercase;
}

</style>
<body>
    
<div class="productContainer">

    <div class="form">
        <h4 class="title">Agrega tu producto</h4>
        <form id="productForm">
            <input id="nameProduct" type="text" placeholder="Nombre del producto">
            <input id="priceProduct" type="text" placeholder="Precio">
            <input id="imageProduct" type="text" placeholder="Foto del producto">
            <input type="submit" value="Agregar">
        </form>

        <table class="table">
            <thead>
            <tr>
            <th>Nombre del producto</th>
            <th>Precio</th>
            <th>Foto</th>
            </tr>
            </thead>
            <tbody id="poolProducts">
            </tbody>
        </table>
    </div>

</div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./client.socket.js"></script>
</body>
</html>
