<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
</head>
<body>
    <div>
        <h1>Carga tu producto</h1>
        <form action="/api/products" enctype="multipart/form-data" method="post">
            <input type="number" name="timestamp" placeholder="Fecha"> <br>
            <input type="text" name="nombre" placeholder="Nombre"> <br>
            <input type="text" name="descripcion" placeholder="Descripcion"> <br>
            <input type="number" name="codigo" placeholder="Codigo"> <br>
            <input type="number" name="price" placeholder="Precio"> <br>
            <input type="submit">
        </form>
    </div>
    <div>
        <h1>Modifica un producto</h1>
        <form action="/api/products" enctype="multipart/form-data" method="put">
            <input type="number" name="id" placeholder="Id"> <br>
            <input type="text" name="nameModify" placeholder="Nombre"> <br>
            <input type="number" name="priceModify" placeholder="Precio"> <br>
            <input type="submit">
        </form>
    </div>
    </div>    
</body>
</html>
